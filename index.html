<div class="audio-player">
    <div class=audio-info>
        <div class=album-cover><img src="MamaCass_DreamALittleDreamOfMe.webp" alt="Mama Cass Album Cover"></div>
        <h3 class="audio-title">Dream A Little Dream Of Me</h3>
        <p class="audio-sub">Mama Cass</p>
    </div>

    <button class="play-btn" id="playBtn">▶</button>

    <div class="progress-container">
        <div class="progress" id="progress"></div>
    </div>

    <span class="time" id="time">0:00</span>

    <audio id="audio" src="Mama Cass - Dream A Little Dream Of Me (with lyrics).mp3"></audio>
</div>

<script>
    const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const time = document.getElementById("time");

playBtn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
});

audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";

    const mins = Math.floor(audio.currentTime / 60);
    const secs = Math.floor(audio.currentTime % 60).toString().padStart(2, "0");
    time.textContent = `${mins}:${secs}`;
});

</script>
